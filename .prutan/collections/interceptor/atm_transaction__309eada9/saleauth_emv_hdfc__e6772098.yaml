rules: |-
  accNum = ireq.getBody("2");
  expDate = ireq.getBody("14");
  code = fn.generateRandomNumber(3);
  data = fn.generateRandomNumber(10);
  ireq.setBody("35", fn.concatenate(accNum,"=",expDate,code,data));
clientRules: |-
  // 5F2A : Transaction Currency Code
  tagValue = ires.getEMVTagValue("55","5F2A");
  print("emv Tag - 5F2A value:- " + tagValue);

  // 9A : Transaction Date
  tagValue = ires.getEMVTagValue("55","9A");
  print("emv Tag - 9A value:- " + tagValue);

  // 5F2A : Transaction Currency Code
  ires.setEMVTagValue("55","5F2A","INR");

  // 9A : Transaction Date
  ires.setEMVTagValue("55","9A","2026-04-16");
