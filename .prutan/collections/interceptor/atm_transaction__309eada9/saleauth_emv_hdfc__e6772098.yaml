contentType: application/iso
requestBody: |-
  <isomsg direction="outgoing">
    <field id="0" value="0200"/>
    <field id="3" value="{{sale_processing_code}}"/>      <!-- Injected from environment variables. -->
    <field id="4" value="{{txn1_amount}}"/>               <!-- Injected from environment variables. -->
    <field id="11" value="000000123001"/>
    <field id="22" value="{{POS_entryMode}}"/>            <!-- Injected from environment variables. -->
    <field id="23" value="{{Card_sequenceNumber}}"/>      <!-- Injected from environment variables. -->
    <field id="25" value="{{POS_conditionCode}}"/>        <!-- Injected from environment variables. -->
    <field id="41" value="00000000TERM1234"/>
    <field id="42" value="00000000000000000000MERCH1234567890"/>
    <field id="49" value="{{currency_code}}"/>            <!-- Injected from environment variables. -->
    <field id="55" value=""/>
  </isomsg>
responseBody: |-
  <isomsg direction="incoming">
    <field id="0" value="0210"/>
    <field id="2" value="{{$echo()}}"/>           <!-- Function used to fetch the required value from the incoming request -->
    <field id="3" value="{{$echo()}}"/>           <!-- Function used to fetch the required value from the incoming request -->
    <field id="4" value="{{txn1_amount}}"/>       <!-- Injected from environment variables. -->
    <field id="7" value="{{$echo()}}"/>           <!-- Function used to fetch the required value from the incoming request -->
    <field id="11" value="000000123001"/>
    <field id="12" value="{{$echo()}}"/>          <!-- Function used to fetch the required value from the incoming request -->
    <field id="37" value="{{txn1_RRN}}"/>         <!-- Injected from environment variables. -->
    <field id="38" value="AUTH01"/>
    <field id="39" value="0000"/>
    <field id="41" value="{{$echo()}}"/>          <!-- Function used to fetch the required value from the incoming request -->
    <field id="42" value="{{$echo()}}"/>          <!-- Function used to fetch the required value from the incoming request -->
    <field id="55" value="9F2608AABBCCDDEEFF11229F2701809F100806010A03A48010009F34031E03009F3501228407A0000000041010950580200080009F1A0207649F0206000001680000"/>
  </isomsg>
