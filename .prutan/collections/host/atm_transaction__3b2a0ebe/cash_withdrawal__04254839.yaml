overview:
  priority: null
  summary: Processes ISO 8583 PIN block verification for cash withdrawal transaction
  description: "<h2>Type</h2><p>Host</p><p></p><h2>Format</h2><p>ISO</p><p></p><h2>Request Body</h2><p><strong>Content-Type:</strong> <code>application/iso</code></p><p>The request body represents an <strong>ISO 8583 PIN verification transaction</strong>.</p><p>Key details:</p><p>\tMTI (field 0) = 0200, indicating a financial transaction request</p><p>\tProcessing code (field 3) = 210000, used for PIN-related verification</p><p>\tCard number (field 2), transaction amount (field 4), and trace identifiers are provided</p><p>\tTrack 2 data (field 35) is included for card validation</p><p>\tTerminal and transaction identifiers (fields 37, 41) are present</p><p>\tCurrency is defined using field 49</p><p>This request is used to validate the customer PIN securely at the host level.</p><p></p><h2>Response Body</h2><p><strong>Content-Type:</strong> <code>application/iso</code></p><p>The response body represents the <strong>ISO 8583 PIN verification response</strong>.</p><p>It includes:</p><p>\tResponse\
    \ MTI (field 0) = 0210</p><p>\tProcessing code (field 3) updated for the response</p><p>\tEchoed transaction and card-related fields</p><p>\tVerification result populated into field 41</p><p>\tCurrency and transaction identifiers retained from the request</p><p>The response confirms whether the submitted PIN block is valid.</p><p></p><h2>Rules</h2><h3>req. (Request Rules)</h3><p>\tReads the PIN block from request field 43</p><p>\tUses the provided PIN (1234) and key set (Default Keys 2601301251) for verification</p><p>\tRetrieves cryptographic keys for logging and validation:</p><p>\t\tPEK (PIN Encryption Key)</p><p>\t\tMAK (Message Authentication Key)</p><p>\t\tTEK (Terminal Encryption Key)</p><p></p><h3>res. (Response Rules)</h3><p>\tVerifies the PIN block using fn.verifyPinBlock</p><p>\tSets the verification result (true / false) into response field 41</p><p>\tUpdates the PEK value dynamically using fn.setPEK</p><p>\tLogs cryptographic key details for debugging and traceability</p><p>This\
    \ logic ensures <strong>secure PIN validation</strong> and controlled key management within HostBox.</p>"
