rules: |-
  pinblock = req.getBody("43");

  isVerified = fn.verifyPinBlock(pinblock, "1234", "Default Keys 2606241140");
  res.setBody("41", isVerified);

  pek = fn.getPEK("Default Keys 2606241140");
  print("PEK: " + pek);
  mak = fn.getMAK("Default Keys 2606241140");
  print("MAK: " + mak);
  tek = fn.getTEK("Default Keys 2606241140");
  print("TEK: " + tek);

  fn.setPEK("Default Keys 2606241140", "1314686BA7A1A32433337544DFECA1CD14D798");
