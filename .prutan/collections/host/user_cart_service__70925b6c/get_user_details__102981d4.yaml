overview:
  priority: null
  summary: Retrieves user profile and account balance from HostBox
  description: "<h2>Type</h2><p>Host</p><p></p><h2>Format</h2><p>REST</p><p></p><h2>Request Body</h2><p>None</p><p>This HostBox request does not accept a request payload.</p><p> All processing is performed based on the internally generated response body.</p><p></p><h2>Response Body</h2><p><strong>Content-Type:</strong> <code>application/json</code></p><p>The response body represents <strong>user profile and account details</strong>, including:</p><p>\tUser identification (_id, guid)</p><p>\tAccount balance (balance)</p><p>\tPersonal details (name, age, gender, email, phone)</p><p>\tCompany and address information</p><p>\tFriends list and tags</p><p>\tGreeting message</p><p>Additionally, the response is dynamically enriched with an <code>isActive</code> flag based on balance evaluation.</p><p></p><h2>Rules</h2><h3>req. (Request Rules)</h3><p>None</p><p>No request-level validation or transformation is applied since there is no request body.</p><p></p><h3>res. (Response Rules)</h3><p>The response\
    \ rule dynamically evaluates the user’s balance and updates the response accordingly:</p><p>\tReads the balance field from the response</p><p>\tIf balance is greater than or equal to 1000:</p><p>\t\tSets isActive = true</p><p>\tIf balance is less than 1000:</p><p>\t\tSets isActive = false</p><p>This enables conditional response enrichment directly within HostBox logic.</p><p></p><p></p>"
