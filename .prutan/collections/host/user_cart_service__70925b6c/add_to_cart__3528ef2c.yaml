guid: 3528ef2c-7a22-429a-b9ec-fa2f6b25c616
name: add_to_cart
collectionFormat: POST
collectionHeadersize: null
collectionMessageRepType: null
collectionAltUrl: null
collectionIpConfig: null
overview:
  priority: null
  summary: Processes cart addition request and builds cart summary response
  description: "<h2>Type</h2><p>Host</p><p></p><h2>Format</h2><p>REST</p><p></p><h2>Request Body</h2><p><strong>Content-Type:</strong> <code>application/json</code></p><p>The request body contains session-related information required for processing the cart logic.</p><p>\tsessionId</p><p>\t\tUsed to identify the active user session</p><p>\t\tNo item details are directly passed in the request body here</p><p></p><h2>Response Body</h2><p><strong>Content-Type:</strong> <code>application/json</code></p><p>The response body represents the <strong>cart summary</strong> generated by HostBox logic.</p><p>It includes:</p><p>\tOperation status</p><p>\tUser identifier (populated dynamically using an InBuiltFunction {{$echo()}})</p><p>\tCart identifier</p><p>\tTotal number of items and total amount</p><p>\tItem-level details such as product name, quantity, and pricing</p><p>\tCurrency information added dynamically during processing</p><p></p><h2>Params</h2><table style=\"border: 1px solid #000;\"><tbody><tr><td\
    \ data-row=\"1\">Name</td><td data-row=\"1\">Value</td><td data-row=\"1\">Description</td></tr><tr><td data-row=\"2\">currency</td><td data-row=\"2\">USD</td><td data-row=\"2\">Currency used for cart processing</td></tr></tbody></table><p></p><h2>Headers</h2><table style=\"border: 1px solid #000;\"><tbody><tr><td data-row=\"1\">Header Name</td><td data-row=\"1\">Value</td><td data-row=\"1\">Description</td></tr><tr><td data-row=\"2\">content-type</td><td data-row=\"2\">application/json</td><td data-row=\"2\">Request and response payload format</td></tr><tr><td data-row=\"3\">X-Request-ID</td><td data-row=\"3\">76abf562-2235-435f-8aff-234c4511db44</td><td data-row=\"3\">Unique request identifier</td></tr></tbody></table><p></p><h2>Rules</h2><h3>req. (Request Rules)</h3><p>\tReads userId and items from the incoming request</p><p>\tChecks the presence of product IDs inside the request items</p><p>\tUses presence checks to decide whether to propagate or default values</p><h3>res. (Response\
    \ Rules)</h3><p>The response is dynamically constructed and enriched based on request data:</p><p>\tSets static values:</p><p>\t\tcurrency = USD</p><p>\tMaps request data to response:</p><p>\t\tCopies userId from request to response</p><p>\t\tCopies first item object into item01</p><p>\tConditional response population:</p><p>\t\tIf items[0].productId exists → sets it in response</p><p>\t\tIf missing → sets value as NA</p><p>\t\tIf items[1].productId is missing → defaults to NA</p><p>\tLogs request and response details for debugging:</p><p>\t\tProduct ID</p><p>\t\tRequest items</p><p>\t\tTotal items in response</p><p>This logic ensures the response is <strong>fault-tolerant</strong>, even when optional request data is missing.</p>"
format: REST
method: POST
endpoint: http://127.0.0.1:57591/prutan/exec/prutan/core/router/HB/3528ef2c-7a22-429a-b9ec-fa2f6b25c616
contentType: application/json
requestBody: |-
  {
        "sessionId": "abcde-67890"
  }
responseBody: |-
  {
       "status": "success",
       "userId": "{{$echo()}}",
       "cartId": "cart-7890",
       "totalItems": 3,
       "totalAmount": 149.97,
       "items": [
           {

               "productName": "Wireless Mouse",
               "quantity": 2,
               "pricePerUnit": 29.99
           },
           {
               "productId": "P002",
               "productName": "Keyboard",
               "quantity": 1,
               "pricePerUnit": 89.99
           }
       ]
  }
headers:
- name: content-type
  value: application/json
  enabled: true
- name: X-Request-ID
  value: b90ac63a-e49a-473b-8f1e-fe0ab33c5ba0
  enabled: true
params:
- name: currency
  value: USD
  enabled: true
auth: null
preRequisite: null
rules: |-
  res.setBody("currency","USD");
  res.setBody('userId',req.getBody('userId'));
  res.setBody('item01', req.getBody("items[0]"));

  if(req.isPresent(req.getBody('items[0].productId'))){
  res.setBody('items[0].productId',req.getBody('items[0].productId'));
  }else{
  res.setBody('items[0].productId','NA');
  };

  if(req.isNotPresent(req.getBody('items[1].productId'))){
  res.setBody('items[1].productId','NA');
  }else{
  res.setBody('items[1].productId',req.getBody('items[1].productId'));
  };

  print("product - id is " + req.getBody('items[0].productId'));
  print("Req - Items are" + req.getBody('items'));
  print("In Res total-Items are " + res.getBody('totalItems'));
integration:
  whatsapp: false
  microsoftTeams: false
  slack: false
  email: false
